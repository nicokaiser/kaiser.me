  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background-color: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.5;
    }

    main {
      flex: 1;
      max-width: 56rem;
      margin-left: auto;
      margin-right: auto;
      width: 100%;
      padding: 4rem 1.5rem;
    }

    /* Header */

    .site-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 4rem;
    }

    .site-logo {
      margin-bottom: 1rem;
    }

    .site-title {
      font-size: 1.25rem;
      font-weight: normal;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 0;
    }

    /* Events table */

    .events-table {
      width: 100%;
      font-size: 0.875rem;
      line-height: 1.25rem;
      margin-bottom: 2rem;
      border-collapse: collapse;
    }

    /* Section heading row */

    .section-heading td {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
      padding: 0 0 1rem;
    }

    .section-heading--spaced td {
      padding-top: 4rem;
    }

    /* Year row */

    .year-row td {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: rgba(255, 255, 255, 0.25);
      padding: 0 0 0.25rem;
    }

    .year-row--spaced td {
      padding-top: 1.5rem;
    }

    /* Event rows */

    .event-row {
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      transition: background-color 0.15s;
    }

    .event-row:hover {
      background-color: rgba(255, 255, 255, 0.03);
    }

    .event-row--past {
      color: rgba(255, 255, 255, 0.5);
    }

    .event-row td {
      padding: 0.75rem 1rem 0.75rem 0;
      vertical-align: top;
    }

    .event-cell-date {
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .event-row:not(.event-row--past) .event-cell-date {
      color: rgba(255, 255, 255, 0.5);
    }

    .artist-name--upcoming {
      font-weight: 500;
    }

    .artist-subtitle {
      display: block;
      font-size: 0.75rem;
      line-height: 1rem;
      margin-top: 0.125rem;
    }

    .event-row--past .artist-subtitle {
      color: rgba(255, 255, 255, 0.3);
    }

    .event-row:not(.event-row--past) .artist-subtitle {
      font-weight: normal;
      color: rgba(255, 255, 255, 0.5);
    }

    .event-cell-title,
    .event-cell-location {
      display: none;
    }

    @media (min-width: 640px) {
      .artist-subtitle {
        display: none;
      }

      .event-cell-title,
      .event-cell-location {
        display: table-cell;
      }
    }

    .event-row:not(.event-row--past) .event-cell-title {
      color: rgba(255, 255, 255, 0.7);
    }

    .event-row:not(.event-row--past) .event-cell-location {
      color: rgba(255, 255, 255, 0.5);
    }

    .event-cell-link {
      padding-right: 0;
      text-align: right;
    }

    .event-link {
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
      transition: color 0.15s;
    }

    .event-link:hover {
      color: #fff;
    }

    .event-link-icon {
      display: inline;
      width: 1rem;
      height: 1rem;
      vertical-align: middle;
    }

    /* Footer */

    .footer-contact {
      text-align: center;
      color: rgba(255, 255, 255, 0.3);
      padding: 2rem 0;
    }

    .contact-link {
      color: inherit;
      text-decoration: none;
      transition: color 0.15s;
    }

    .contact-link:hover {
      color: rgba(255, 255, 255, 0.6);
    }

    .contact-icon {
      display: inline;
      width: 1rem;
      height: 1rem;
      vertical-align: middle;
    }
  </style>

  <script>
    (function () {
      const events = JSON.parse(document.getElementById('events-data').textContent);
      const now = new Date();
      const today = now.getFullYear() + '-'
        + String(now.getMonth() + 1).padStart(2, '0') + '-'
        + String(now.getDate()).padStart(2, '0');

      const upcoming = events.filter(e => e.date >= today).sort((a, b) => a.date < b.date ? -1 : 1);
      const past = events.filter(e => e.date < today).sort((a, b) => a.date < b.date ? 1 : -1);

      const MONTHS = ['Jan.', 'Feb.', 'März', 'Apr.', 'Mai', 'Juni', 'Juli', 'Aug.', 'Sep.', 'Okt.', 'Nov.', 'Dez.'];

      function formatDate(iso) {
        const [, m, d] = iso.split('-');
        return +d + '. ' + MONTHS[+m - 1];
      }

      const ICONS = {
        info: `<svg xmlns="http://www.w3.org/2000/svg" class="event-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>`,
        video: `<svg xmlns="http://www.w3.org/2000/svg" class="event-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect x="2" y="6" width="14" height="12" rx="2"/></svg>`,
      };

      const LABELS = { info: 'More info', video: 'Watch video' };

      function linkCell(link) {
        if (!link) return '<td class="event-cell-link"></td>';
        return `<td class="event-cell-link"><a href="${link.url}" class="event-link" title="${LABELS[link.type]}" aria-label="${LABELS[link.type]}">${ICONS[link.type]}</a></td>`;
      }

      function renderRows(list, isPast, isFirst) {
        if (!list.length) return '';
        const html = [];
        const label = isPast ? 'Vergangene Auftritte' : 'Nächste Auftritte';
        const headingClass = isFirst ? 'section-heading' : 'section-heading section-heading--spaced';
        html.push(`<tr class="${headingClass}"><td colspan="5">${label}</td></tr>`);

        let lastYear = null;
        for (const e of list) {
          const year = e.date.slice(0, 4);
          if (year !== lastYear) {
            const yearClass = lastYear ? 'year-row year-row--spaced' : 'year-row';
            html.push(`<tr class="${yearClass}"><td colspan="5">${year}</td></tr>`);
            lastYear = year;
          }

          if (isPast) {
            html.push(`<tr class="event-row event-row--past">
          <td class="event-cell-date">${formatDate(e.date)}</td>
          <td class="event-cell-artist">
            <span>${e.artist}</span>
            <span class="artist-subtitle">${e.title} · ${e.location}</span>
          </td>
          <td class="event-cell-title">${e.title}</td>
          <td class="event-cell-location">${e.location}</td>
          ${linkCell(e.link)}
        </tr>`);
          } else {
            html.push(`<tr class="event-row">
          <td class="event-cell-date">${formatDate(e.date)}</td>
          <td class="event-cell-artist">
            <span class="artist-name--upcoming">${e.artist}</span>
            <span class="artist-subtitle">${e.title} · ${e.location}</span>
          </td>
          <td class="event-cell-title">${e.title}</td>
          <td class="event-cell-location">${e.location}</td>
          ${linkCell(e.link)}
        </tr>`);
          }
        }
        return html.join('\n');
      }

      document.getElementById('events-body').innerHTML =
        renderRows(upcoming, false, true) +
        renderRows(past, true, upcoming.length === 0);
    })();
  </script>

</body>

</html>
